
<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <canvas width="400" height="200" id="canvas"></canvas>


<script>
    const canvas=document.querySelector("#canvas");
    const ctx=canvas.getContext("2d");


    ctx.beginPath();  //rozpoczęcie nowej ścieżki
    ctx.moveTo(50,50);
    ctx.lineTo(150,50);
    ctx.lineTo(150,150);
    ctx.lineTo(50,150);
    ctx.lineTo(50,50);
    ctx.stroke();
</script>
</body>
</html>
